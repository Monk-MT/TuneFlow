name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Diagnose
        shell: bash
        run: |
          echo "::error::NODE_ENV=[$NODE_ENV] npm_config_production=[$npm_config_production]"
          echo "::error::node=$(node -v) npm=$(npm -v)"
          ls node_modules/.bin | grep -i electron | while IFS= read -r l; do echo "::error::bin: $l"; done
          test -e node_modules/electron-vite/bin/electron-vite.js && echo "::error::electron-vite present" || echo "::error::electron-vite MISSING"

      - name: Build
        run: npm run build

      - name: Package and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
