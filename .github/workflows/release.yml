name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        shell: bash
        run: |
          set +e
          npx electron-vite build > build.log 2>&1
          code=$?
          cat build.log
          if [ $code -ne 0 ]; then
            echo "::error::BUILD FAILED (exit $code). Tail:"
            tail -40 build.log | while IFS= read -r line; do echo "::error::$line"; done
          fi
          exit $code

      - name: Package and publish
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
