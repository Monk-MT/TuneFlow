name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Diagnose
        shell: bash
        run: |
          BINS=$(ls node_modules/.bin 2>/dev/null | grep -i electron | tr '\n' ',')
          EV=$(test -e node_modules/electron-vite/bin/electron-vite.js && echo YES || echo NO)
          PKG=$(test -d node_modules/electron-vite && echo YES || echo NO)
          COUNT=$(ls node_modules 2>/dev/null | wc -l | tr -d ' ')
          echo "DIAG node=$(node -v) NODE_ENV=[$NODE_ENV] nm_count=$COUNT ev_pkg=$PKG ev_bin=$EV ebins=[$BINS]"
          echo "::error title=DIAG::node=$(node -v) nm_count=$COUNT ev_pkg=$PKG ev_bin=$EV ebins=[$BINS]"
          exit 1

      - name: Build
        run: npm run build

      - name: Package and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
