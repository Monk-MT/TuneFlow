name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev --foreground-scripts

      - name: Build
        shell: bash
        run: |
          set +e
          EV=$(test -e node_modules/electron-vite/bin/electron-vite.js && echo YES || echo NO)
          NM=$(ls node_modules 2>/dev/null | wc -l | tr -d ' ')
          node node_modules/electron-vite/bin/electron-vite.js build > build.log 2>&1
          code=$?
          cat build.log
          if [ $code -ne 0 ]; then
            MSG="DIAG ev_bin=$EV nm_count=$NM exit=$code :: $(tail -5 build.log | tr '\n' '|')"
            echo "::error title=BUILDFAIL::$MSG"
          fi
          exit $code

      - name: Package and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
